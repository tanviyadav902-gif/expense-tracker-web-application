<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recently Deleted</title>

<link rel="stylesheet" href="2.css">

<style>

body{
font-family:Arial;
text-align:center;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:red;
color:white;
}

button{
padding:8px 12px;
margin:3px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Recently Deleted Expenses</h1>

<h3 id="deletedTotal">
Total Deleted: &#8377;0
</h3>

<table id="deletedTable">

<tr>

<th>Date Deleted</th>
<th>Expense</th>
<th>Amount</th>
<th>Actions</th>

</tr>

</table>

<br>

<p id="Back-to-Home">
<a href="2.html">Back</a>
</p>

<script>

var deleted =
JSON.parse(localStorage.getItem("deletedExpenses")) || [];

var table =
document.getElementById("deletedTable");

function loadTable(){

table.innerHTML = `

<tr>

<th>Date Deleted</th>
<th>Expense</th>
<th>Amount</th>
<th>Actions</th>

</tr>

`;

var total = 0;

deleted.forEach(function(exp,index){

total += Number(exp.amount);

table.innerHTML += `

<tr>

<td>
${new Date(exp.deletedAt).toLocaleString()}
</td>

<td>
${exp.name}
</td>

<td>
&#8377;${exp.amount}
</td>

<td>

<button onclick="restoreExpense(${index})">
Restore
</button>

<button onclick="deleteForever(${index})">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("deletedTotal").innerHTML =
"Total Deleted: &#8377;" + total;

}

loadTable();


// ================= RESTORE =================

async function restoreExpense(index){

var item = deleted[index];

try{

await fetch("/api/expenses",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:item.name,
amount:item.amount

})

});

deleted.splice(index,1);

localStorage.setItem(

"deletedExpenses",

JSON.stringify(deleted)

);

loadTable();

alert("Expense Restored Successfully");

}

catch(err){

alert("Restore Failed");

}

}


// ================= PERMANENT DELETE =================

function deleteForever(index){

var confirmDelete =
confirm("Delete permanently?");

if(confirmDelete){

deleted.splice(index,1);

localStorage.setItem(

"deletedExpenses",

JSON.stringify(deleted)

);

loadTable();

}

}

</script>

</body>
</html>
